<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="referrer" content="no-referrer-when-downgrade">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>守夜人桌遊社</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "Noto Sans TC", sans-serif;
      background: #f5f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #333;
    }
    .card {
      background: #fff;
      padding: 32px;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 24px;
    }
    p {
      margin: 0;
      color: #666;
      line-height: 1.6;
    }
    .loading {
      margin-top: 18px;
      font-size: 14px;
      color: #3366cc;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 18px;
      background: #3366cc;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>守夜人桌遊社</h1>
    <p>正在檢查登入狀態，請稍候…</p>
    <div class="loading" id="msg">驗證中</div>
    <a class="btn" id="loginLink" href="/login.html" style="display:none;">前往登入</a>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyARLnYPUUSVIXiK3UJnlSw93AeAm3_sSz8",
      authDomain: "itribgc-0.firebaseapp.com",
      projectId: "itribgc-0",
      storageBucket: "itribgc-0.firebasestorage.app",
      messagingSenderId: "535892877472",
      appId: "1:535892877472:web:2270ac423ffd6f38b1e9c5"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    const auth = firebase.auth();
    const msg = document.getElementById("msg");
    const loginLink = document.getElementById("loginLink");

    auth.onAuthStateChanged(function(user) {
      if (user) {
        msg.textContent = "已登入，正在前往首頁…";
        window.location.replace("/home/");
      } else {
        msg.textContent = "尚未登入，請先登入";
        loginLink.style.display = "inline-block";
        setTimeout(() => {
          window.location.replace("/login.html");
        }, 500);
      }
    });
  </script>
</body>
</html>
