<script>
const track = document.querySelector(".carousel-track");
const slides = document.querySelectorAll(".carousel-slide");
const prevBtn = document.querySelector(".prev");
const nextBtn = document.querySelector(".next");
const dotsContainer = document.querySelector(".carousel-dots");

let index = 0;
let timer;

slides.forEach((_, i) => {
  const dot = document.createElement("button");
  dot.addEventListener("click", () => goToSlide(i));
  dotsContainer.appendChild(dot);
});

const dots = dotsContainer.querySelectorAll("button");

function update() {
  track.style.transform = `translateX(-${index * 100}%)`;
  dots.forEach((d, i) => d.classList.toggle("active", i === index));
}

function goToSlide(i) {
  index = (i + slides.length) % slides.length;
  update();
}

function next() {
  goToSlide(index + 1);
}

function prev() {
  goToSlide(index - 1);
}

nextBtn.onclick = next;
prevBtn.onclick = prev;

function start() {
  timer = setInterval(next, 3000);
}

function stop() {
  clearInterval(timer);
}

document.getElementById("carousel").addEventListener("mouseenter", stop);
document.getElementById("carousel").addEventListener("mouseleave", start);

update();
start();
</script>

  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const memberEmailEl = document.getElementById("memberEmail");

  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = "/login.html";
      return;
    }

    if (memberEmailEl) {
      memberEmailEl.textContent = user.email;
    }

    document.body.style.visibility = "visible";
  });

  window.logoutMember = async function () {
    try {
      await signOut(auth);
      window.location.href = "/login.html";
    } catch (error) {
      alert("登出失敗：" + (error.message || error.code));
    }
  };
</script>
