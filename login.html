<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>桌遊社登入</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      background: #f5f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: white;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 380px;
    }
    h1 {
      margin-top: 0;
      font-size: 24px;
    }
    .desc {
      color: #666;
      margin-bottom: 20px;
    }
    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0 14px;
      border: 1px solid #ccc;
      border-radius: 10px;
      box-sizing: border-box;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      opacity: 0.95;
    }
    .links {
      margin-top: 14px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .links a {
      color: #2563eb;
      text-decoration: none;
      font-size: 14px;
    }
    #msg {
      margin-top: 14px;
      font-size: 14px;
      color: #d93025;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>桌遊社登入</h1>
    <div class="desc">請使用公司 Email 登入</div>

    <input id="email" type="email" placeholder="請輸入 Email" />
    <input id="password" type="password" placeholder="請輸入密碼" />

    <button id="loginBtn">登入</button>

    <div class="links">
      <a href="register.html">註冊帳號</a>
      <a href="forgot-password.html">忘記密碼</a>
    </div>

    <div id="msg"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
    import {
      getAuth,
      setPersistence,
      browserLocalPersistence,
      signInWithEmailAndPassword,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "請貼上你的 apiKey",
      authDomain: "請貼上你的 authDomain",
      projectId: "請貼上你的 projectId",
      storageBucket: "請貼上你的 storageBucket",
      messagingSenderId: "請貼上你的 messagingSenderId",
      appId: "請貼上你的 appId"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const msgEl = document.getElementById("msg");
    const loginBtn = document.getElementById("loginBtn");

    await setPersistence(auth, browserLocalPersistence);

    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = "index.html";
      }
    });

    loginBtn.addEventListener("click", async () => {
      msgEl.textContent = "";

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        msgEl.textContent = "請輸入 Email 和密碼";
        return;
      }

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = "index.html";
      } catch (error) {
        msgEl.textContent = "登入失敗：" + (error.message || error.code);
      }
    });
  </script>
</body>
</html>
